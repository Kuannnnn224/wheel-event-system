services:
  mysql:
    image: mysql:8.4
    container_name: wheel-event-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: wheel_event
      MYSQL_USER: wheel_app
      MYSQL_PASSWORD: wheel_password
      TZ: Asia/Taipei
    ports:
      - "3306:3306"
    volumes:
      - wheel_mysql_data:/var/lib/mysql
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]

volumes:
  wheel_mysql_data:
