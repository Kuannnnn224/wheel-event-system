<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>100% Winning Super Spin</title>
    <style>
      :root {
        --gold: #ffcf47;
        --orange: #ff8d22;
        --cyan: #27e6ff;
        --pink: #ff4ffd;
        --purple: #5b1dbb;
        --panel: rgba(32, 16, 83, 0.72);
        --panel-strong: rgba(48, 28, 126, 0.88);
        --text: #ffffff;
        --muted: #c8bbff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        color: var(--text);
        background: #03000e;
        font-family:
          Inter,
          ui-rounded,
          "Arial Rounded MT Bold",
          "Microsoft JhengHei",
          system-ui,
          sans-serif;
      }

      button {
        font: inherit;
      }

      .webview-root {
        position: relative;
        width: 100vw;
        height: 100vh;
        min-width: 320px;
        min-height: 560px;
        background:
          radial-gradient(circle at 46% 52%, rgba(255, 66, 238, 0.26), transparent 36%),
          url("/webview-assets/wheel-stage-bg.png") center / cover no-repeat;
      }

      .webview-root::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at 50% 50%, transparent 42%, rgba(0, 0, 0, 0.38) 100%),
          linear-gradient(180deg, rgba(0, 0, 0, 0.12), rgba(0, 0, 0, 0.24));
      }

      .promo-copy {
        position: absolute;
        left: clamp(22px, 6vw, 112px);
        top: clamp(32px, 9vh, 116px);
        z-index: 2;
        width: min(36vw, 430px);
        text-shadow:
          0 4px 0 #8d2400,
          0 10px 18px rgba(0, 0, 0, 0.42),
          0 0 24px rgba(255, 186, 50, 0.32);
      }

      .promo-kicker {
        font-size: clamp(46px, 8vw, 118px);
        line-height: 0.86;
        font-weight: 1000;
        color: var(--gold);
        letter-spacing: 0;
        -webkit-text-stroke: clamp(2px, 0.3vw, 4px) #ff6d13;
      }

      .promo-main {
        margin-top: 10px;
        font-size: clamp(26px, 4.6vw, 72px);
        line-height: 0.96;
        font-weight: 1000;
        color: #ffd729;
        -webkit-text-stroke: clamp(1px, 0.2vw, 3px) #ff6d13;
      }

      .promo-sub {
        margin-top: 16px;
        font-size: clamp(18px, 2.6vw, 42px);
        line-height: 1;
        font-weight: 1000;
        color: #28ffff;
        text-shadow:
          0 3px 0 #a000d8,
          0 0 18px rgba(255, 63, 255, 0.86);
      }

      .wheel-area {
        position: absolute;
        z-index: 3;
        left: 62.2%;
        top: 42.4%;
        width: min(32vw, 548px);
        aspect-ratio: 1;
        transform: translate(-50%, -50%);
        --label-radius: min(10vw, 176px);
        filter: drop-shadow(0 20px 18px rgba(0, 0, 0, 0.3));
      }

      .wheel-pointer {
        display: none;
      }

      .wheel-pointer::after {
        display: none;
      }

      .wheel-frame {
        display: none;
      }

      .wheel-disc {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        overflow: hidden;
        transform: rotate(var(--wheel-rotation, 0deg));
        transition: transform 4.4s cubic-bezier(0.14, 0.86, 0.18, 1);
        background: conic-gradient(
          from -36deg,
          #f521cc 0deg 72deg,
          #ffe618 72deg 144deg,
          #1fc0e8 144deg 216deg,
          #f0142c 216deg 288deg,
          #79ce20 288deg 360deg
        );
        box-shadow:
          inset 0 0 0 clamp(5px, 0.7vw, 9px) rgba(255, 255, 255, 0.18),
          inset 0 0 32px rgba(0, 0, 0, 0.48),
          0 0 0 clamp(5px, 0.8vw, 11px) rgba(70, 27, 112, 0.7);
      }

      .wheel-disc::after {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-conic-gradient(
          from -36deg,
          rgba(0, 0, 0, 0.48) 0deg 2deg,
          transparent 2deg 72deg
        );
        opacity: 0.62;
      }

      .wheel-label {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 30%;
        height: 48px;
        margin: -24px 0 0 -15%;
        display: grid;
        place-items: center;
        color: #ffffff;
        font-size: clamp(13px, 1.5vw, 22px);
        font-weight: 1000;
        line-height: 1.05;
        text-align: center;
        text-shadow:
          0 2px 0 #1f1737,
          0 0 10px rgba(0, 0, 0, 0.7);
        transform:
          rotate(var(--angle))
          translateY(calc(-1 * var(--label-radius)))
          rotate(calc(-1 * var(--angle)));
        z-index: 2;
      }

      .wheel-label small {
        display: block;
        color: #fff8a9;
        font-size: 0.72em;
        text-align: center;
      }

      .spin-center {
        position: absolute;
        z-index: 7;
        inset: 34.5%;
        border: 0;
        border-radius: 50%;
        color: #5b6372;
        font-size: clamp(18px, 2.4vw, 34px);
        font-weight: 1000;
        letter-spacing: 0;
        background:
          radial-gradient(circle at 38% 28%, #ffffff 0 10%, #d7e3ed 28%, #7b8796 60%, #d7e3ed 82%, #ffffff 100%);
        box-shadow:
          inset 0 0 0 7px rgba(255, 255, 255, 0.8),
          inset 0 0 22px rgba(0, 0, 0, 0.28),
          0 0 0 9px rgba(14, 22, 44, 0.5);
        cursor: pointer;
      }

      .spin-center:disabled {
        cursor: not-allowed;
        filter: grayscale(0.55) brightness(0.78);
      }

      .vip-track {
        position: absolute;
        z-index: 4;
        right: clamp(18px, 6.7vw, 116px);
        top: 14%;
        width: min(15vw, 190px);
        display: flex;
        flex-direction: column-reverse;
        gap: 1.6vh;
      }

      .vip-card {
        position: relative;
        min-height: clamp(58px, 9.5vh, 94px);
        padding: 10px 8px;
        border: 2px solid rgba(66, 240, 255, 0.28);
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(88, 61, 188, 0.74), rgba(42, 29, 112, 0.88));
        box-shadow:
          inset 0 0 20px rgba(126, 72, 255, 0.42),
          0 0 18px rgba(33, 229, 255, 0.2);
        text-align: center;
        color: #ddd8ff;
      }

      .vip-card.is-active {
        color: #ffffff;
        border-color: #37e8ff;
        background: linear-gradient(180deg, #34d7ff, #1289dc);
        box-shadow:
          inset 0 0 20px rgba(255, 255, 255, 0.28),
          0 0 28px rgba(38, 228, 255, 0.72);
      }

      .vip-card.is-complete {
        border-color: rgba(255, 213, 87, 0.74);
      }

      .vip-title {
        display: block;
        font-size: clamp(18px, 2.1vw, 27px);
        font-weight: 1000;
        line-height: 1;
      }

      .vip-threshold {
        display: block;
        margin-top: 4px;
        font-size: clamp(11px, 1.3vw, 17px);
        font-weight: 900;
      }

      .control-panel {
        position: absolute;
        z-index: 5;
        left: 50%;
        bottom: clamp(22px, 7.2vh, 86px);
        width: min(36vw, 520px);
        transform: translateX(-12%);
        padding: 16px 18px 18px;
        border: 3px solid rgba(255, 157, 40, 0.82);
        border-radius: 22px;
        background: linear-gradient(180deg, rgba(93, 24, 143, 0.9), rgba(35, 13, 77, 0.95));
        box-shadow:
          inset 0 0 18px rgba(255, 73, 255, 0.35),
          0 0 28px rgba(236, 66, 255, 0.4);
      }

      .progress-bar {
        height: 18px;
        overflow: hidden;
        border: 3px solid #ffd22f;
        border-radius: 999px;
        background: rgba(20, 4, 47, 0.82);
      }

      .progress-fill {
        width: var(--turnover-progress, 0%);
        height: 100%;
        background: linear-gradient(90deg, #ff7b23, #fff05e);
        transition: width 300ms ease;
      }

      .control-row {
        margin-top: 12px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
      }

      .status-text {
        min-width: 0;
        padding: 10px 14px;
        border-radius: 999px;
        color: #ffffff;
        background: rgba(11, 7, 31, 0.72);
        font-size: clamp(12px, 1.2vw, 16px);
        font-weight: 900;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .bet-button {
        min-width: 112px;
        height: 44px;
        border: 0;
        border-radius: 12px;
        color: #7b2700;
        font-size: clamp(14px, 1.2vw, 17px);
        font-weight: 1000;
        background: linear-gradient(180deg, #fff34b, #ff9b1c);
        box-shadow:
          inset 0 2px 0 rgba(255, 255, 255, 0.62),
          0 8px 14px rgba(0, 0, 0, 0.26);
      }

      .result-toast {
        position: absolute;
        z-index: 8;
        left: 60%;
        top: auto;
        bottom: clamp(116px, 19vh, 196px);
        width: min(380px, 30vw);
        padding: 14px 18px;
        border: 2px solid rgba(255, 221, 80, 0.9);
        border-radius: 22px;
        background: linear-gradient(180deg, rgba(73, 29, 134, 0.94), rgba(25, 13, 70, 0.96));
        box-shadow: 0 0 32px rgba(255, 70, 243, 0.48);
        text-align: center;
        transform: translate(-50%, 12px);
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 240ms ease,
          transform 240ms ease;
      }

      .result-toast.is-visible {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      .result-title {
        display: block;
        color: #fff656;
        font-size: clamp(18px, 2.2vw, 30px);
        font-weight: 1000;
      }

      .result-detail {
        display: block;
        margin-top: 8px;
        color: #ffffff;
        font-size: clamp(12px, 1.2vw, 16px);
        font-weight: 850;
      }

      .loading-state {
        position: absolute;
        inset: auto 18px 16px;
        z-index: 8;
        color: var(--muted);
        font-size: 13px;
        text-align: center;
      }

      @media (max-width: 900px) {
        .webview-root {
          min-height: 100svh;
          background-position: 58% center;
        }

        .promo-copy {
          width: 38vw;
          left: 18px;
          top: 24px;
        }

        .wheel-area {
          width: min(56vw, 430px);
          left: 55%;
          top: 40%;
          --label-radius: min(18vw, 142px);
        }

        .vip-track {
          right: 10px;
          top: 13%;
          width: 112px;
          gap: 8px;
        }

        .vip-card {
          min-height: 56px;
          border-radius: 14px;
        }

        .control-panel {
          width: calc(100vw - 34px);
          left: 50%;
          bottom: 18px;
          transform: translateX(-50%);
        }

        .wheel-label {
          transform:
            rotate(var(--angle))
            translateY(calc(-1 * var(--label-radius)))
            rotate(calc(-1 * var(--angle)));
        }

        .result-toast {
          left: 50%;
          bottom: 120px;
          width: min(360px, 82vw);
        }
      }
    </style>
  </head>
  <body>
    <main class="webview-root">
      <section class="promo-copy" aria-label="活動標題">
        <div class="promo-kicker">100%</div>
        <div class="promo-main">WINNING</div>
        <div class="promo-sub">SUPER SPIN</div>
      </section>

      <section class="wheel-area" aria-label="幸運轉盤">
        <div class="wheel-pointer" aria-hidden="true"></div>
        <div class="wheel-frame" aria-hidden="true"></div>
        <div class="wheel-disc" id="wheelDisc"></div>
        <button class="spin-center" id="spinButton" type="button">SPIN</button>
      </section>

      <aside class="vip-track" id="vipTrack" aria-label="階段門檻"></aside>

      <section class="control-panel">
        <div class="progress-bar" aria-label="流水進度">
          <div class="progress-fill" id="turnoverProgress"></div>
        </div>
        <div class="control-row">
          <div class="status-text" id="statusText">載入玩家資料中...</div>
          <button class="bet-button" id="betButton" type="button">Go Bet</button>
        </div>
      </section>

      <section class="result-toast" id="resultToast" aria-live="polite">
        <span class="result-title" id="resultTitle"></span>
        <span class="result-detail" id="resultDetail"></span>
      </section>

      <div class="loading-state" id="debugText"></div>
    </main>

    <script>
      const API_BASE = new URLSearchParams(window.location.search).get("apiBase") || "http://localhost:3001";
      const token = new URLSearchParams(window.location.search).get("token");
      const wheelDisc = document.getElementById("wheelDisc");
      const spinButton = document.getElementById("spinButton");
      const vipTrack = document.getElementById("vipTrack");
      const statusText = document.getElementById("statusText");
      const debugText = document.getElementById("debugText");
      const turnoverProgress = document.getElementById("turnoverProgress");
      const resultToast = document.getElementById("resultToast");
      const resultTitle = document.getElementById("resultTitle");
      const resultDetail = document.getElementById("resultDetail");
      const betButton = document.getElementById("betButton");
      const rewardAngles = {
        A: 0,
        B: 72,
        C: 144,
        D: 216,
        E: 288,
      };
      let state;
      let wheelRotation = 0;
      let selectedStageNumber = 1;

      function formatPoints(value) {
        return Number(value || 0).toLocaleString();
      }

      function stageTitle(stageNumber) {
        return `VIP${stageNumber}`;
      }

      function sortedStages() {
        return [...(state?.stages || [])].sort((a, b) => a.stageNumber - b.stageNumber);
      }

      function currentStage() {
        return sortedStages().find((stage) => stage.stageNumber === selectedStageNumber) || sortedStages()[0];
      }

      function nextPlayableStage() {
        const progress = state?.progress;
        if (!progress) return 0;

        for (let stageNumber = 1; stageNumber <= progress.unlockedStage; stageNumber += 1) {
          if (!progress.playedStages.includes(stageNumber)) {
            return stageNumber;
          }
        }

        return 0;
      }

      function stageStatus(stageNumber) {
        const progress = state?.progress;
        if (!progress) return "locked";
        if (progress.playedStages.includes(stageNumber)) return "complete";
        if (stageNumber === nextPlayableStage()) return "active";
        if (stageNumber <= progress.unlockedStage) return "ready";
        return "locked";
      }

      function renderVipTrack() {
        vipTrack.innerHTML = "";
        for (const stage of sortedStages()) {
          const button = document.createElement("button");
          const status = stageStatus(stage.stageNumber);
          button.type = "button";
          button.className = `vip-card ${status === "active" || selectedStageNumber === stage.stageNumber ? "is-active" : ""} ${status === "complete" ? "is-complete" : ""}`;
          button.disabled = status === "locked";
          button.innerHTML = `
            <span class="vip-title">${stageTitle(stage.stageNumber)}</span>
            <span class="vip-threshold">流水 ${formatPoints(stage.turnoverThresholdPoints)}</span>
          `;
          button.addEventListener("click", () => {
            selectedStageNumber = stage.stageNumber;
            render();
          });
          vipTrack.appendChild(button);
        }
      }

      function renderWheelLabels() {
        const stage = currentStage();
        const prizes = [...(stage?.prizes || [])].sort((a, b) => a.sortOrder - b.sortOrder || a.rewardCode.localeCompare(b.rewardCode));
        wheelDisc.innerHTML = "";

        prizes.forEach((prize, index) => {
          const label = document.createElement("div");
          label.className = "wheel-label";
          label.style.setProperty("--angle", `${index * 72}deg`);
          label.innerHTML = `
            <span>${prize.name}</span>
            <small>${prize.rewardCode} 獎</small>
          `;
          wheelDisc.appendChild(label);
        });
      }

      function renderStatus() {
        const progress = state?.progress;
        const stage = currentStage();
        if (!progress || !stage) {
          spinButton.disabled = true;
          statusText.textContent = token ? "載入玩家資料中..." : "缺少 token，請從 Demo 網站建立連結";
          return;
        }

        const playableStage = nextPlayableStage();
        const currentStatus = stageStatus(stage.stageNumber);
        const maxThreshold = Math.max(...sortedStages().map((item) => item.turnoverThresholdPoints));
        const progressRate = maxThreshold > 0 ? Math.min((progress.turnoverPoints / maxThreshold) * 100, 100) : 0;
        turnoverProgress.style.setProperty("--turnover-progress", `${progressRate}%`);

        if (currentStatus === "active") {
          spinButton.disabled = false;
          statusText.textContent = `可抽 ${stageTitle(stage.stageNumber)}，目前流水 ${formatPoints(progress.turnoverPoints)}`;
          return;
        }

        spinButton.disabled = true;

        if (currentStatus === "complete") {
          statusText.textContent = `${stageTitle(stage.stageNumber)} 今日已抽過`;
        } else if (playableStage > 0) {
          statusText.textContent = `請先抽 ${stageTitle(playableStage)}`;
        } else if (progress.unlockedStage >= 5 && progress.playedStages.length >= 5) {
          statusText.textContent = "今日 5 階段已完成";
        } else {
          statusText.textContent = `尚差 ${formatPoints(Math.max(stage.turnoverThresholdPoints - progress.turnoverPoints, 0))} 流水`;
        }
      }

      function render() {
        renderVipTrack();
        renderWheelLabels();
        renderStatus();
      }

      async function apiFetch(path, options) {
        const response = await fetch(`${API_BASE}${path}`, {
          headers: {
            "Content-Type": "application/json",
          },
          ...options,
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.message || "server error");
        }
        return data;
      }

      async function loadState() {
        if (!token) {
          renderStatus();
          return;
        }

        state = await apiFetch(`/demo/session?token=${encodeURIComponent(token)}`);
        const playableStage = nextPlayableStage();
        selectedStageNumber = playableStage || Math.min(Math.max(state.progress.unlockedStage, 1), 5);
        debugText.textContent = "";
        render();
      }

      function showResult(result) {
        resultTitle.textContent = `${result.prize.rewardCode} 獎 ${result.prize.name}`;
        resultDetail.textContent = `獲得 ${formatPoints(result.prize.amountPoints)} 點 · ${result.probabilityTable.toUpperCase()} 表`;
        resultToast.classList.add("is-visible");
        window.setTimeout(() => resultToast.classList.remove("is-visible"), 4200);
      }

      function animateToPrize(rewardCode) {
        const targetAngle = rewardAngles[rewardCode] ?? 0;
        const pointerCompensation = 360 - targetAngle;
        wheelRotation += 1800 + pointerCompensation;
        wheelDisc.style.setProperty("--wheel-rotation", `${wheelRotation}deg`);
      }

      async function spin() {
        const stage = currentStage();
        if (!stage || spinButton.disabled) return;

        spinButton.disabled = true;
        statusText.textContent = "抽獎中...";

        try {
          const result = await apiFetch("/spins/real", {
            method: "POST",
            body: JSON.stringify({
              token,
              stageNumber: stage.stageNumber,
            }),
          });
          animateToPrize(result.prize.rewardCode);
          window.setTimeout(async () => {
            showResult(result);
            await loadState();
          }, 4400);
        } catch (error) {
          statusText.textContent = error instanceof Error ? error.message : "抽獎失敗";
          spinButton.disabled = false;
        }
      }

      spinButton.addEventListener("click", spin);
      betButton.addEventListener("click", () => {
        statusText.textContent = "Go Bet 將於接平台後導向投注頁";
      });

      loadState().catch((error) => {
        spinButton.disabled = true;
        debugText.textContent = error instanceof Error ? error.message : "初始化失敗";
        statusText.textContent = "無法載入活動資料";
      });
    </script>
  </body>
</html>
